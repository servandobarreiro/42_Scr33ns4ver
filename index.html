<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>push_swap</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    :root {
      --bg:      #0e1117; --surface: #161b22; --border: #30363d;
      --muted:   #8b949e; --text: #e6edf3;
      --blue:    #58a6ff; --green: #3fb950; --red: #f85149;
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      height: 100%; overscroll-behavior: none;
    }
    #shell { display: flex; flex-direction: column; min-height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; border-bottom: 0.5px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 10; gap: 8px;
    }
    .brand { font-size: 13px; color: var(--blue); letter-spacing: 0.08em; flex-shrink: 0; }
    .nav-ops { font-size: 13px; color: var(--muted); flex-shrink: 0; }
    .nav-ops span { color: var(--text); font-weight: 600; }
    #music-btn {
      font-family: 'Courier New', monospace; font-size: 11px;
      padding: 4px 10px; border-radius: 6px; border: 0.5px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      touch-action: manipulation; transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }
    #music-btn.on  { border-color: var(--green); color: var(--green); background: #0d2816; }
    #music-btn:active { transform: scale(0.95); }

    #body { flex: 1; overflow-y: auto; padding: 12px 12px 0; }
    #win-banner {
      display: none; background: #0d2816; border: 0.5px solid #1a4a2a;
      border-radius: 8px; padding: 8px 12px; font-size: 13px;
      color: var(--green); font-weight: 600; margin-bottom: 10px;
    }
    #timer-row {
      display: block; margin-bottom: 10px;
    }
    #time-meter {
      position: relative; width: 100%; height: 18px;
      background: #11161e; border: 0.5px solid var(--border);
      border-radius: 999px; overflow: hidden;
    }
    #time-meter-fill {
      position: absolute; inset: 0 auto 0 0;
      width: 100%; background: linear-gradient(90deg, #3fb950 0%, #58a6ff 100%);
      transition: width 0.24s ease, background 0.24s ease;
    }
    #time-meter-text {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 600;
      color: var(--text); text-shadow: 0 0 8px rgba(0,0,0,0.55);
      pointer-events: none;
    }
    #status-line { min-height: 18px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }

    #stacks-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .stack-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; min-width: 0; }
    .stack-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
    .stack-well {
      width: 100%; min-height: 200px; background: var(--surface);
      border: 0.5px solid var(--border); border-radius: 8px;
      padding: 6px; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
    }
    .empty-hint { font-size: 11px; color: #484f58; margin: auto; }
    .bar {
      border-radius: 4px; height: 26px; display: flex;
      align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; transition: width 0.12s ease;
    }
    .bar.is-top    { outline: 2px solid var(--blue); outline-offset: 1px; }
    .bar.is-sorted { background: #1D9E75 !important; color: #E1F5EE !important; }
    .bar.ping { outline: 2px solid #ffd700; outline-offset: 1px; }

    .divider { border: none; border-top: 0.5px solid var(--border); margin: 0 0 10px; }
    #log-area {
      min-height: 36px; max-height: 36px; overflow: hidden;
      display: flex; flex-wrap: wrap; gap: 3px; align-content: flex-start; margin-bottom: 10px;
    }
    .chip       { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #21262d; color: var(--muted); border: 0.5px solid var(--border); }
    .chip.fresh { background: #0d2744; color: var(--blue); border-color: #1f4b7a; }
    .chip.err   { background: #2d0f0f; color: var(--red);  border-color: #5c1a1a; }

    #terminal {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 9px 12px; margin-bottom: 12px; width: 55%;
    }
    #prompt { color: var(--green); font-size: 14px; white-space: nowrap; }
    #cmd-input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Courier New', monospace;
      font-size: 14px; flex: 1; min-width: 0; caret-color: var(--blue);
    }

    #bottom-panel {
      position: sticky; bottom: 0; background: var(--bg);
      border-top: 0.5px solid var(--border);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    }
    #hint-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 7px; margin-bottom: 10px;
    }
    .op-btn {
      font-family: 'Courier New', monospace; font-size: 13px; font-weight: 500;
      height: 46px; border-radius: 8px; background: #21262d; color: var(--muted);
      border: 0.5px solid var(--border); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-user-select: none; user-select: none; touch-action: manipulation;
      transition: background 0.08s, transform 0.08s;
    }
    .op-btn:active { background: #2d333b; color: var(--text); transform: scale(0.93); }
    #new-row { display: flex; gap: 8px; align-items: center; }
    .ops-label { font-size: 13px; color: var(--muted); margin-right: 4px; }
    .ops-label span { color: var(--text); font-weight: 600; }
    .new-btn {
      font-family: 'Courier New', monospace; font-size: 12px;
      height: 38px; padding: 0 13px; border-radius: 8px;
      background: transparent; color: var(--muted); border: 0.5px solid var(--border);
      cursor: pointer; touch-action: manipulation; transition: background 0.08s;
    }
    .new-btn:active { background: #21262d; color: var(--text); }
  </style>
</head>
<body>
<div id="shell">
  <div id="navbar">
    <span class="brand">push_swap</span>
    <button id="music-btn" onclick="toggleMusic()">♪ off</button>
    <span class="nav-ops">ops: <span id="op-count">0</span><span id="ops-limit-badge" style="color:var(--muted)"></span></span>
    <span class="nav-ops" id="timer-badge" style="display:none">⏱ <span id="timer-display">0:00</span></span>
  </div>
  <div id="body">
    <div id="win-banner"></div>
    <div id="timer-row">
      <div id="time-meter">
        <div id="time-meter-fill"></div>
        <span id="time-meter-text"></span>
      </div>
    </div>
    <div id="lose-banner" style="display:none;background:#2d0f0f;border:0.5px solid #5c1a1a;border-radius:8px;padding:8px 12px;font-size:13px;color:#f85149;font-weight:600;margin-bottom:10px;"></div>
    <div id="status-line"></div>
    <div id="stacks-row">
      <div class="stack-col"><div class="stack-label">A</div><div class="stack-well" id="well-a"></div></div>
      <div class="stack-col"><div class="stack-label">B</div><div class="stack-well" id="well-b"></div></div>
    </div>
    <hr class="divider">
    <div id="log-area"></div>
    <div id="terminal">
      <span id="prompt">$&gt;</span>
      <input id="cmd-input" type="text" autocomplete="off" autocorrect="off"
        autocapitalize="none" spellcheck="false" placeholder="op + enter" inputmode="text">
    </div>
  </div>
  <div id="bottom-panel">
    <div id="hint-grid">
      <div class="op-btn" ontouchstart="" onclick="tapOp('sa')">sa</div>
      <div class="op-btn" ontouchstart="" onclick="tapOp('sb')">sb</div>
      <div class="op-btn" ontouchstart="" onclick="tapOp('ss')">ss</div>
      <div class="op-btn" ontouchstart="" onclick="tapOp('pa')">pa</div>
      <div class="op-btn" ontouchstart="" onclick="tapOp('pb')">pb</div>
      <div class="op-btn" ontouchstart="" onclick="tapOp('ra')">ra</div>
      <div class="op-btn" ontouchstart="" onclick="tapOp('rb')">rb</div>
      <div class="op-btn" ontouchstart="" onclick="tapOp('rr')">rr</div>
      <div class="op-btn" ontouchstart="" onclick="tapOp('rra')">rra</div>
      <div class="op-btn" ontouchstart="" onclick="tapOp('rrb')">rrb</div>
    </div>
    <div id="new-row">
      <span class="ops-label">ops: <span id="op-count2">0</span></span>
      <button class="new-btn" ontouchstart="" onclick="newGame(5)">new 5</button>
      <button class="new-btn" ontouchstart="" onclick="newGame(7)">new 7</button>
      <button class="new-btn" ontouchstart="" onclick="newGame(10)">new 10</button>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────
   GAME STATE
───────────────────────────────────────────── */
let A=[], B=[], opCount=0, history=[], won=false, lost=false;

// Limits per puzzle size
// Optimal solutions: 5≈12, 7≈20, 10≈35 — limits give ~60% headroom
const LIMITS = {
  5:  { ops: 17,  secs: 80 },
  7:  { ops: 25,  secs: 90 },
  10: { ops: 35,  secs: 100 },
};
let currentN = 5;
let opsLimit  = LIMITS[5].ops;
let timeLimit = LIMITS[5].secs;
let timeLeft  = 0;
let timerInterval = null;

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = timeLimit;
  updateTimerDisplay();
  document.getElementById('timer-badge').style.display = '';
  document.getElementById('timer-row').style.display = '';
  timerInterval = setInterval(() => {
    if (won || lost) { clearInterval(timerInterval); return; }
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) triggerLose("time's up");
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-badge').style.display = 'none';
  document.getElementById('timer-row').style.display = 'none';
}

function updateTimerDisplay() {
  const m = Math.floor(Math.abs(timeLeft) / 60);
  const s = Math.abs(timeLeft) % 60;
  const el = document.getElementById('timer-display');
  el.textContent = m + ':' + String(s).padStart(2,'0');
  el.style.color = timeLeft <= 20 ? 'var(--red)' : timeLeft <= 45 ? '#ffd700' : 'var(--text)';

  const meterFill = document.getElementById('time-meter-fill');
  const meterText = document.getElementById('time-meter-text');
  const widthPct = Math.max(0, Math.min(100, (timeLeft / timeLimit) * 100));
  meterFill.style.width = widthPct + '%';
  if (timeLeft <= 20) {
    meterFill.style.background = 'linear-gradient(90deg, #f85149 0%, #ff9f86 100%)';
    meterText.textContent = 'LOW TIME';
  } else if (timeLeft <= 45) {
    meterFill.style.background = 'linear-gradient(90deg, #ffd700 0%, #ffcb42 100%)';
    meterText.textContent = 'TIME RUNNING';
  } else {
    meterFill.style.background = 'linear-gradient(90deg, #3fb950 0%, #58a6ff 100%)';
    meterText.textContent = 'TIME LEFT ' + m + ':' + String(s).padStart(2,'0');
  }
}

function triggerLose(reason) {
  lost = true;
  clearInterval(timerInterval);
  stopSequencer();
  beepError(); vibe([80,50,80,50,80]);
  const b = document.getElementById('lose-banner');
  b.style.display = 'block';
  b.textContent = '\u2717 ' + reason + ' \u2014 try again';
}

function updateOpsDisplay() {
  document.getElementById('op-count').textContent = opCount;
  document.getElementById('op-count2').textContent = opCount;
  const badge = document.getElementById('ops-limit-badge');
  const remaining = opsLimit - opCount;
  badge.textContent = '/' + opsLimit;
  badge.style.color = remaining <= 5 ? 'var(--red)' : remaining <= 10 ? '#ffd700' : 'var(--muted)';
}

const BAR_COLORS=[
  ['#7F77DD','#EEEDFE'],['#1D9E75','#E1F5EE'],['#D85A30','#FAECE7'],
  ['#378ADD','#E6F1FB'],['#BA7517','#FAEEDA'],['#D4537E','#FBEAF0'],
  ['#639922','#EAF3DE'],['#888780','#F1EFE8'],
];

/* ─────────────────────────────────────────────
   AUDIO ENGINE
───────────────────────────────────────────── */
let ctx = null;
let musicOn = false;
let seqHandle = null;
let masterGain = null;

// pentatonic minor: C3 Eb3 F3 G3 Bb3 C4 Eb4 F4 G4 Bb4 C5
const PENTA = [130.81,155.56,174.61,196.00,233.08,261.63,311.13,349.23,392.00,466.16,523.25];

function getCtx() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(ctx.destination);
    // Delay/echo chain for sequencer notes: dotted-8th at 120 BPM = 375ms
    const dl = ctx.createDelay(1.0);
    dl.delayTime.value = 0.375;
    const dfb = ctx.createGain(); dfb.gain.value = 0.38; // feedback
    const dwet = ctx.createGain(); dwet.gain.value = 0.32; // wet level
    dl.connect(dfb); dfb.connect(dl); dl.connect(dwet); dwet.connect(masterGain);
    ctx._delayWet = dwet; ctx._delayIn = dl;
  }
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

// map a stack value (1-based rank) to a pentatonic freq
function toFreq(val, stackSize) {
  const idx = Math.min(Math.round((val - 1) / Math.max(stackSize - 1, 1) * (PENTA.length - 1)), PENTA.length - 1);
  return PENTA[idx];
}

/* sequencer tone — routed through delay send */
function playSeqTone(freq, type='sine', dur=0.18, vol=0.07, detune=0) {
  try {
    const c = getCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g);
    g.connect(masterGain);       // dry
    if (c._delayIn) g.connect(c._delayIn); // wet send
    o.type = type;
    o.frequency.value = freq;
    if (detune) o.detune.value = detune;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e) {}
}

/* short pitched tone for op feedback */
function playTone(freq, type='sine', dur=0.08, vol=0.09, detune=0) {
  try {
    const c = getCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(masterGain);
    o.type = type;
    o.frequency.value = freq;
    if (detune) o.detune.value = detune;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e) {}
}

/* op-specific pitched beeps */
function beepOp(op) {
  const c = getCtx(), t = c.currentTime;
  if (op === 'sa' || op === 'sb' || op === 'ss') {
    // swap: two-tone flick
    playTone(330, 'triangle', 0.07, 0.1);
    setTimeout(() => playTone(440, 'triangle', 0.07, 0.1), 60);
  } else if (op === 'pa' || op === 'pb') {
    // push: soft pluck
    playTone(523, 'sine', 0.12, 0.1);
  } else if (op.startsWith('rr')) {
    // reverse rotate: low thud
    playTone(110, 'sine', 0.1, 0.12);
  } else {
    // rotate: mid click
    playTone(262, 'square', 0.05, 0.06);
  }
}

function beepError() {
  try {
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(masterGain);
    o.type='square';
    o.frequency.setValueAtTime(180,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(80,c.currentTime+0.22);
    g.gain.setValueAtTime(0.2,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.22);
    o.start();o.stop(c.currentTime+0.22);
  } catch(e) {}
}

function beepWin() {
  try {
    const c=getCtx();
    [523,659,784,988,1047].forEach((f,i) => {
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(masterGain);
      o.type='sine'; o.frequency.value=f;
      const t=c.currentTime+i*0.13;
      g.gain.setValueAtTime(0.15,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o.start(t); o.stop(t+0.3);
    });
  } catch(e) {}
}

/* ─────────────────────────────────────────────
   POLYRHYTHMIC SEQUENCER  — 120 BPM
   Master clock: 1 bar = 4 beats = 2000 ms
   Stack A → A.length subdivisions per bar (sine, melodic)
   Stack B → B.length subdivisions per bar (triangle, rhythmic)
   Both reset on the downbeat → true polyrhythm
───────────────────────────────────────────── */
// 120 BPM, 10 subdivisions per bar → one note every 200 ms
// This is the fixed pulse rate regardless of stack size.
// Stack size determines how many pitches are in the cycle, not how fast they fire.
const NOTE_MS = 200; // (60/120)*4*1000 / 10 = 200 ms

let seqStep  = 0;
let seqBStep = 0;
let _aTimer  = null;
let _bTimer  = null;

function playArpNote(stack, idx, vol, dur, wave) {
  if (!stack.length) return;
  const i = idx % stack.length;
  const total = A.length + B.length || stack.length;
  const freq = toFreq(stack[i], total);
  pingBar(i, stack === A ? 'well-a' : 'well-b');
  playSeqTone(freq, wave, dur, vol);
}

function schedA() {
  if (!musicOn) return;
  if (A.length) playArpNote(A, seqStep++, 0.07, 0.18, 'sine');
  _aTimer = setTimeout(schedA, NOTE_MS);
}

// Stack B fires on the same pulse but offset by half a step for polyrhythmic feel
// when both stacks have pieces — the offset is NOTE_MS * (A.length / (A.length + B.length))
// giving a natural interleave. We keep it simple: B fires at NOTE_MS too, but starts
// offset by NOTE_MS/2 so it lands between A's hits when sizes differ.
function schedB() {
  if (!musicOn) return;
  if (B.length) playArpNote(B, seqBStep++, 0.055, 0.16, 'triangle');
  _bTimer = setTimeout(schedB, NOTE_MS);
}

function startSequencer() {
  stopSequencer();
  if (!musicOn) return;
  seqStep = 0; seqBStep = 0;

  // pad drone: C2 + G2, very quiet
  try {
    const c = getCtx();
    const o1 = c.createOscillator(), o2 = c.createOscillator();
    const g = c.createGain();
    o1.connect(g); o2.connect(g); g.connect(masterGain);
    o1.type = 'sine'; o1.frequency.value = 65.41; // C2
    o2.type = 'sine'; o2.frequency.value = 98.00; // G2
    o2.detune.value = 4;
    g.gain.value = 0.04;
    o1.start(); o2.start();
    window._droneOscs = [o1, o2, g];
  } catch(e) {}

  schedA();
  // B starts half a pulse later so its hits land between A's when stacks are equal size
  _bTimer = setTimeout(schedB, NOTE_MS / 2);
}

function stopSequencer() {
  if (_aTimer) { clearTimeout(_aTimer); _aTimer = null; }
  if (_bTimer) { clearTimeout(_bTimer); _bTimer = null; }
  seqStep = 0; seqBStep = 0;
  if (window._droneOscs) {
    try { window._droneOscs[0].stop(); window._droneOscs[1].stop(); } catch(e) {}
    window._droneOscs = null;
  }
}

function toggleMusic() {
  getCtx(); // unlock audio on user gesture
  musicOn = !musicOn;
  const btn = document.getElementById('music-btn');
  if (musicOn) {
    btn.textContent = '♪ on';
    btn.classList.add('on');
    startSequencer();
  } else {
    btn.textContent = '♪ off';
    btn.classList.remove('on');
    stopSequencer();
  }
}

// visual ping on the bar being played
function pingBar(idx, wellId) {
  const well = document.getElementById(wellId);
  const bars = well.querySelectorAll('.bar');
  if (!bars[idx]) return;
  bars[idx].classList.add('ping');
  setTimeout(() => bars[idx] && bars[idx].classList.remove('ping'), 180);
}

/* ─────────────────────────────────────────────
   GAME LOGIC
───────────────────────────────────────────── */
function isSorted(a) {
  for (let i=1;i<a.length;i++) if (a[i-1]>a[i]) return false;
  return true;
}
function vibe(p) { try { if (navigator.vibrate) navigator.vibrate(p); } catch(e) {} }
function setOps(n) {
  opCount = n;
  updateOpsDisplay();
}
function setStatus(m, e) {
  const el = document.getElementById('status-line');
  el.textContent = m;
  el.style.color = e ? '#f85149' : '#8b949e';
}
function addLog(op, e) {
  const area = document.getElementById('log-area');
  const old = area.querySelector('.fresh');
  if (old) old.classList.remove('fresh');
  const c = document.createElement('span');
  c.className = 'chip' + (e ? ' err' : ' fresh');
  c.textContent = op;
  area.appendChild(c);
}

function newGame(n) {
  const v = Array.from({length:n}, (_,i) => i+1);
  do {
    for (let i=v.length-1;i>0;i--) {
      const j = Math.floor(Math.random()*(i+1));
      [v[i],v[j]] = [v[j],v[i]];
    }
  } while (isSorted(v));
  currentN = n;
  const lim = LIMITS[n] || { ops: Math.round(n * 6), secs: n * 24 };
  opsLimit = lim.ops; timeLimit = lim.secs;
  A=[...v]; B=[]; opCount=0; history=[]; won=false; lost=false;
  document.getElementById('win-banner').style.display = 'none';
  document.getElementById('lose-banner').style.display = 'none';
  document.getElementById('log-area').innerHTML = '';
  setOps(0); setStatus('');
  seqStep=0; seqBStep=0;
  render();
  startTimer();
  if (musicOn) startSequencer();
}

function renderWell(id, stack, total, sorted) {
  const w = document.getElementById(id);
  w.innerHTML = '';
  if (!stack.length) {
    const h = document.createElement('div');
    h.className = 'empty-hint'; h.textContent = 'empty';
    w.appendChild(h); return;
  }
  stack.forEach((val, idx) => {
    const bar = document.createElement('div');
    const s = sorted && id === 'well-a';
    bar.className = 'bar' + (idx===0 ? ' is-top' : '') + (s ? ' is-sorted' : '');
    if (!s) {
      const [bg,fg] = BAR_COLORS[(val-1) % BAR_COLORS.length];
      bar.style.background = bg; bar.style.color = fg;
    }
    bar.style.width = Math.round(22 + (val/total) * ((w.offsetWidth||140) - 32)) + 'px';
    bar.textContent = val;
    w.appendChild(bar);
  });
}

function render() {
  const total = A.length + B.length;
  const sorted = B.length===0 && A.length>0 && isSorted(A);
  renderWell('well-a', A, total, sorted);
  renderWell('well-b', B, total, false);
  setOps(opCount);
  if (sorted && !won) {
    won = true;
    stopSequencer();
    stopTimer();
    beepWin();
    vibe([60,40,60,40,120]);
    const b = document.getElementById('win-banner');
    b.style.display = 'block';
    const timeUsed = timeLimit - timeLeft;
    const tm = Math.floor(timeUsed/60), ts = timeUsed%60;
    const timeStr = tm > 0 ? tm+'m '+ts+'s' : ts+'s';
    const pct = Math.round((opCount / opsLimit) * 100);
    b.textContent = '\u2713 sorted! ' + opCount + '/' + opsLimit + ' ops \u00b7 ' + timeStr + ' \u00b7 efficiency ' + (100-pct) + '%';
    // triumphant win arpeggio from sorted stack after short delay
    setTimeout(() => {
      if (!musicOn) return;
      A.forEach((val, i) => {
        setTimeout(() => {
          const freq = toFreq(val, A.length);
          playTone(freq, 'sine', 0.4, 0.12);
        }, i * 90);
      });
    }, 400);
  }
}

function execOp(op) {
  if (won || lost) return;
  const snap = {A:[...A], B:[...B]};
  let ok=true, msg='';
  if      (op==='sa') { if(A.length>=2){[A[0],A[1]]=[A[1],A[0]];}else{ok=false;msg='sa: need ≥2 in A';} }
  else if (op==='sb') { if(B.length>=2){[B[0],B[1]]=[B[1],B[0]];}else{ok=false;msg='sb: need ≥2 in B';} }
  else if (op==='ss') { if(A.length>=2)[A[0],A[1]]=[A[1],A[0]]; if(B.length>=2)[B[0],B[1]]=[B[1],B[0]]; }
  else if (op==='pa') { if(B.length>0){A.unshift(B.shift());}else{ok=false;msg='pa: B is empty';} }
  else if (op==='pb') { if(A.length>0){B.unshift(A.shift());}else{ok=false;msg='pb: A is empty';} }
  else if (op==='ra') { if(A.length>1){A.push(A.shift());}else{ok=false;msg='ra: need ≥2 in A';} }
  else if (op==='rb') { if(B.length>1){B.push(B.shift());}else{ok=false;msg='rb: need ≥2 in B';} }
  else if (op==='rr') { if(A.length>1)A.push(A.shift()); if(B.length>1)B.push(B.shift()); }
  else if (op==='rra'){ if(A.length>1){A.unshift(A.pop());}else{ok=false;msg='rra: need ≥2 in A';} }
  else if (op==='rrb'){ if(B.length>1){B.unshift(B.pop());}else{ok=false;msg='rrb: need ≥2 in B';} }
  else { ok=false; msg='unknown: '+op; }

  if (!ok) {
    beepError(); vibe(80);
    addLog(op, true); setStatus(msg, true);
    return;
  }
  history.push(snap);
  opCount++;
  beepOp(op);
  addLog(op, false); setStatus('');
  render();
  if (!won && opCount >= opsLimit) triggerLose('ops limit reached');
}

function undoOp() {
  if (!history.length) { beepError(); setStatus('nothing to undo', true); return; }
  const s = history.pop();
  A=s.A; B=s.B; opCount--;
  won=false; lost=false;
  document.getElementById('win-banner').style.display='none';
  document.getElementById('lose-banner').style.display='none';
  const chips = document.getElementById('log-area').querySelectorAll('.chip');
  if (chips.length) chips[chips.length-1].remove();
  setStatus(''); render();
}

function tapOp(op) { execOp(op); }

document.getElementById('cmd-input').addEventListener('keydown', e => {
  if (e.key==='Enter') {
    e.preventDefault();
    const inp=e.target, v=inp.value.trim().toLowerCase();
    inp.value='';
    if (!v) return;
    if (v==='undo') { undoOp(); return; }
    if (v.startsWith('new ')) { const n=parseInt(v.split(' ')[1]); if(n>=3&&n<=15){newGame(n);return;} }
    execOp(v);
  }
  if (e.key==='ArrowUp') {
    e.preventDefault();
    const chips=document.getElementById('log-area').querySelectorAll('.chip:not(.err)');
    if (chips.length) e.target.value=chips[chips.length-1].textContent;
  }
});

newGame(5);
</script>
