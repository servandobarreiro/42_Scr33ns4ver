const codeLower = code.toLowerCase();

let i = 0, x = 0, y = 0;
const charW = 13;
const lineH = 23;
const fontSize = 19;
const marginX = 20;
const marginY = 20;

let cols, rows;
let j = 0; // hue cycle counter
let sj = 0; // saturation cycle counter (rotates slower than hue)
let bj = 0; // brightness cycle counter (rotates at its own rate too)

function computeGrid() {
  cols = Math.floor((windowWidth - marginX * 2) / charW);
  rows = Math.floor((windowHeight - marginY * 2) / lineH);
}

function setup() {
  computeGrid();
  const cnv = createCanvas(windowWidth, windowHeight);
  cnv.id('p5-layer');
  textFont('Consolas, Monaco, "Courier New", monospace');
  textSize(fontSize);
  textAlign(LEFT, TOP);
  colorMode(HSB);
  frameRate(30);
  clear();
}

function windowResized() {
  computeGrid();
  resizeCanvas(windowWidth, windowHeight);
  clear();
  x = 0;
  y = 0;

  hydraCanvas.width = windowWidth;
  hydraCanvas.height = windowHeight;
  try {
    hydra.setResolution(windowWidth, windowHeight);
  } catch (e) {
    // older hydra-synth builds may not expose setResolution
  }
}

function draw() {
  if (x === 0 && y === 0) {
    clear();
  }

  const c = codeLower[i % codeLower.length];

  if (c === '\n') {
    y++;
    x = 0;
  } else {
    // wrap the visible window once we fill the screen
    if (y >= rows) {
      clear();
      y = 0;
      j = 0;
    }

    const px = x * charW + marginX;
    const py = y * lineH + marginY;
    const charsPerFill = cols * rows;

    const hue = (j * 6 % charsPerFill) / charsPerFill * 360;
    const sat = 55 + 40 * (0.5 + 0.5 * Math.sin(sj * 0.7));
    const bri = 85 + 5 * (0.5 + 0.5 * Math.sin(bj * 0.3 + 1.5));

    fill(hue, sat, bri);
    text(c, px, py);

    x++;
    if (x >= cols) {
      x = 0;
      y++;
    }
    j++;
    sj++;
    bj++;
  }

  i++;
}
