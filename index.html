<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydra Visuals</title>
    <script src="https://unpkg.com/hydra-synth"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="hydra-canvas"></canvas>
    <script>
        window.addEventListener('load', () => {
            const canvas = document.getElementById("hydra-canvas");

            // Set actual pixel resolution, scaled for high-DPI screens
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;

            const hydra = new Hydra({
                canvas: canvas,
                detectAudio: false,
                makeGlobal: true,
                width: canvas.width,
                height: canvas.height
            });

            function runVisuals() {
                let dots = () => osc(20, 0.08, 5.5)
                  .rotate(0.05)
                  .modulateScale(osc(10, 0.05, 0.5).rotate(1.5), 0.7)
                  .color(0.8, 0.1, 0.5)
                  .add(osc(32, -0.05, 3.8).color(0.41, 0.99, 0.6));

                speed = 1;

                shape(100, 0.73, .32)
                  .diff(shape(100, 0.69, .07))
                  .mult(osc(3, 0.5, 62))
                  .scale(1, window.innerHeight / window.innerWidth)
                  .modulate(noise(.01))
                  .diff(noise(.4), .5)
                  .luma(.52, .2)
                  .add(dots(o0), .5)
                  .modulate(osc(.2, 0.91, 0.5))
                  .add(src(o0), 0.25)
                  .luma(.5, .015)
                  .invert()
                  .out(o0);
            }

            runVisuals();

            // Keep resolution correct if the window is resized
            window.addEventListener('resize', () => {
                const dpr = window.devicePixelRatio || 1;
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                hydra.setResolution(canvas.width, canvas.height);
            });
        });
    </script>
</body>
</html>
