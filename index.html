<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydra + p5 Visuals</title>
    <script src="https://unpkg.com/hydra-synth"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas { display: block; }
        #hydra-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        #p5-container {
            position: fixed;
            top: -9999px;
            left: -9999px;
        }
    </style>
</head>
<body>
    <canvas id="hydra-canvas"></canvas>
    <div id="p5-container"></div>

    <script>
        window.addEventListener('load', () => {
            const canvas = document.getElementById("hydra-canvas");
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;

            const hydra = new Hydra({
                canvas: canvas,
                detectAudio: false,
                makeGlobal: true,
                width: canvas.width,
                height: canvas.height
            });

            // --- p5 sketch in Instance Mode ---
            const sketch = (p) => {
                let cCode = [];
                let unicodeIcons = ['★', '⚙', '✦', '✦', '▲', '◆', '✖', '✚', '☯', '☣', '☢', '☭', '⚯', '♔', '♕'];
                let textX = 20;
                let textY = 30;
                let charSize = 16;

                p.preload = () => {
                    cCode = p.loadStrings('code.txt');
                };

                p.setup = () => {
                    let p5Canvas = p.createCanvas(window.innerWidth, window.innerHeight);
                    p5Canvas.parent('p5-container');
                    p.textFont('Courier New');
                    p.textSize(charSize);
                    p.frameRate(30); 
                };

                p.draw = () => {
                    p.background(15);
                    let fullText = cCode.join('\n');
                    let currentX = textX;
                    let currentY = textY;
                    
                    for (let i = 0; i < fullText.length; i++) {
                        let currentChar = fullText.charAt(i);
                        if (currentChar === '\n') {
                            currentY += charSize * 1.5;
                            currentX = textX;
                            continue;
                        }
                        
                        let frequency = 0.05;
                        let r = p.sin(frequency * i + 0) * 127 + 128;
                        let g = p.sin(frequency * i + 2) * 127 + 128;
                        let b = p.sin(frequency * i + 4) * 127 + 128;
                        p.fill(r, g, b);
                        
                        let displayChar = currentChar;
                        if (currentChar !== ' ' && currentChar !== '\t' && p.random(100) < 8) {
                            displayChar = p.random(unicodeIcons);
                        }
                        
                        p.text(displayChar, currentX, currentY);
                        currentX += p.textWidth(currentChar);
                        
                        if (currentX > p.width - textX) {
                            currentY += charSize * 1.5;
                            currentX = textX;
                        }
                    }
                };
            };

            const p5Instance = new p5(sketch);

            // Give Hydra a moment to bind, then run your updated async pipeline
            setTimeout(async () => {
                s0.init({ src: p5Instance.canvas });

                // Load your external Hyper-Hydra text extension safely
                await loadScript("https://cdn.jsdelivr.net/gh/geikha/hyper-hydra@latest/hydra-text.js")
                
                speed = .26
                hydraText.font = "helvetica"
                hydraText.lineWidth = ".95%"
                let str = "SUMMER        \nBASH               \n2026                "
                
                let txt = () => solid(.01,.02)
                    .layer(strokeText(str).color(1,0,.51).modulateScale(noise(.21,1),.01))
                    .layer(strokeText(str).modulateScale(noise(19,.75), .94))
                    .diff(strokeText(str).color(1,1,0).modulateScale(noise(1,.81), .24)).scrollY(0.95,-.1)

                // Main feedback loop combining the generated text and p5 source stream
                solid(.21,.51,1)
                  .mult(osc(33, .21,.6 ).modulate(noise(4, 2)))
                  .modulateScrollX(o0, 0.091)
                  .blend(o0, 0.69)
                  .scale(1.001)
                  .blend(txt(), [.1,.23,.01].smooth())
                  .blend(s0, 0.15) // <-- Blends your rolling C code matrix over the composition
                  .out(o0)

            }, 200);

            window.addEventListener('resize', () => {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                hydra.setResolution(canvas.width, canvas.height);
            });
        });
    </script>
</body>
</html>
