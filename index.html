<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydra + p5 Visuals</title>
    <script src="<script src="https://unpkg.com/hydra-synth@1.3.31/dist/hydra-synth.js"></script>"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas { display: block; }
        #hydra-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        #p5-container {
            position: fixed;
            top: -9999px;
            left: -9999px;
        }
    </style>
</head>
<body>
    <canvas id="hydra-canvas"></canvas>
    <div id="p5-container"></div>

    <script>
        // Small helper to dynamically load an external script and await it.
        // (This was missing entirely, which crashed the setup below.)
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = () => resolve();
                s.onerror = (e) => reject(new Error('Failed to load script: ' + src));
                document.head.appendChild(s);
            });
        }

        window.addEventListener('load', () => {
            const canvas = document.getElementById("hydra-canvas");
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;

            const hydra = new Hydra({
                canvas: canvas,
                detectAudio: false,
                makeGlobal: true,
                width: canvas.width,
                height: canvas.height
            });

            // --- p5 sketch in Instance Mode ---
            const sketch = (p) => {
                // No external code.txt file exists, so embed sample "code" text
                // directly instead of loadStrings (which 404'd and could stall preload).
                let cCode = [
                    'function render(state) {',
                    '  const { time, scale } = state;',
                    '  for (let i = 0; i < 128; i++) {',
                    '    buffer[i] = noise(i * 0.05, time) * scale;',
                    '  }',
                    '  return buffer;',
                    '}',
                    '',
                    'class Feedback {',
                    '  constructor(gain = 0.9) {',
                    '    this.gain = gain;',
                    '    this.taps = [];',
                    '  }',
                    '  process(sig) {',
                    '    return sig * this.gain + this.taps.reduce((a,b)=>a+b,0);',
                    '  }',
                    '}',
                ];
                let unicodeIcons = ['★', '⚙', '✦', '✦', '▲', '◆', '✖', '✚', '☯', '☣', '☢', '☭', '⚯', '♔', '♕'];
                let textX = 20;
                let textY = 30;
                let charSize = 16;

                p.setup = () => {
                    let p5Canvas = p.createCanvas(window.innerWidth, window.innerHeight);
                    p5Canvas.parent('p5-container');
                    p.textFont('Courier New');
                    p.textSize(charSize);
                    p.frameRate(30);
                };

                p.draw = () => {
                    p.background(15);
                    let fullText = cCode.join('\n');
                    let currentX = textX;
                    let currentY = textY;

                    for (let i = 0; i < fullText.length; i++) {
                        let currentChar = fullText.charAt(i);
                        if (currentChar === '\n') {
                            currentY += charSize * 1.5;
                            currentX = textX;
                            continue;
                        }

                        let frequency = 0.05;
                        let r = p.sin(frequency * i + 0) * 127 + 128;
                        let g = p.sin(frequency * i + 2) * 127 + 128;
                        let b = p.sin(frequency * i + 4) * 127 + 128;
                        p.fill(r, g, b);

                        let displayChar = currentChar;
                        if (currentChar !== ' ' && currentChar !== '\t' && p.random(100) < 8) {
                            displayChar = p.random(unicodeIcons);
                        }

                        p.text(displayChar, currentX, currentY);
                        currentX += p.textWidth(currentChar);

                        if (currentX > p.width - textX) {
                            currentY += charSize * 1.5;
                            currentX = textX;
                        }
                    }
                };
            };

            const p5Instance = new p5(sketch);

            // Give Hydra a moment to bind, then run your updated async pipeline
            setTimeout(async () => {
                s0.init({ src: p5Instance.canvas });

                // Load your external Hyper-Hydra text extension safely
                try {
                    await loadScript("https://cdn.jsdelivr.net/gh/geikha/hyper-hydra@latest/hydra-text.js");
                } catch (err) {
                    console.error(err);
                    return; // bail out gracefully if the extension fails to load
                }

                speed = .26
                hydraText.font = "helvetica"
                hydraText.lineWidth = ".95%"
                let str = "SUMMER        \nBASH               \n2026                "

                let txt = () => solid(.01,.02)
                    .layer(strokeText(str).color(1,0,.51).modulateScale(noise(.21,1),.01))
                    .layer(strokeText(str).modulateScale(noise(19,.75), .94))
                    .diff(strokeText(str).color(1,1,0).modulateScale(noise(1,.81), .24)).scrollY(0.95,-.1)

                // Main feedback loop combining the generated text and p5 source stream
                solid(.21,.51,1)
                  .mult(osc(33, .21,.6 ).modulate(noise(4, 2)))
                  .modulateScrollX(o0, 0.091)
                  .blend(o0, 0.69)
                  .scale(1.001)
                  .blend(txt(), [.1,.23,.01].smooth())
                  .blend(s0, 0.15) // <-- Blends your rolling C code matrix over the composition
                  .out(o0)

            }, 200);

            window.addEventListener('resize', () => {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                hydra.setResolution(canvas.width, canvas.height);
            });
        });
    </script>
</body>
</html>
