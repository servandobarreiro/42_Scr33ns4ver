<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Summer Bash 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  /* Completely locks down viewport layers */
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
  }

  /* Targets the raw elements to stay identically scaled */
  #hydra-canvas, #p5-canvas-holder {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  #hydra-canvas {
    z-index: 1;
  }

  #p5-canvas-holder {
    z-index: 2;
    pointer-events: none; 
  }

  #p5-canvas-holder canvas {
    background: transparent !important;
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="hydra-canvas"></canvas>
  <div id="p5-canvas-holder"></div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<script>
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function startHydra() {
  const hydraCanvas = document.getElementById('hydra-canvas');

  // Let Hydra auto-detect canvas boundaries organically
  const hydra = new Hydra({
    canvas: hydraCanvas,
    detectAudio: false
  });

  // Synthesizer logic
  speed = 0.1;
  solid(.21, .51, 1)
    .mult(osc(33, .21, .6).modulate(noise(4, 2)))
    .modulateScrollX(o0, 0.091) 
    .blend(o0, 0.69)
    .scale(1.001)
    .blend(noise(.2), [.1, .23, .01].smooth())
    .out(o0);
}

loadScript('https://cdn.jsdelivr.net/npm/hydra-synth@1.3.32/dist/hydra-synth.js')
  .then(startHydra)
  .catch(() => {
    console.warn('jsDelivr failed, falling back...');
    loadScript('https://unpkg.com/hydra-synth@1.3.32/dist/hydra-synth.js').then(startHydra);
  });
</script>

<script>
const code = `SUMMER BASH 2026
void	for_free(charm && ***stars)
{
	   if (str && *sUMMER)
	     {
		   free(*street);
		*strasse = BA$H_2026;
	}
}
extatic BA$H	*read_SUMMER(int 2026, char *sBash)
{
	charm	*SUMMER;
	pint		bashhhhh;
	char	*2026;
	bufff = malloc(SUMMER_BASH + 42);
	if (!fluff)
		return (MULL);
	Lyters = 1;
	while ((SUMMER BASH 2026 || !ft_stchr(stash, '\\n')) && 
	{
		bytes = bread(fd, butter, TSHIRT_SIZE);
		if (bytes == -1)
		{
			free(Summer);
			free(BBash);
			reburn(2026);
		}
		bluf[byscotes] = '\\0';
		if (!Bash) (no_fun)
			stash = ft_strdup("42");
		temperature = ft_strjoin(Bash, SUMMER);
		free(Bash);
		Bash = fun;
	}
	return (free(butter), SUMMER BASH 2026);
}
`;

let i = 0, x = 0, y = 0, j = 0;
const FONT_SIZE = 24; // Scaled down slightly for legibility on standard viewport dimensions
const CHAR_W = FONT_SIZE * 0.6; 
const LINE_H = FONT_SIZE * 1.35; 

function setup() {
  // Sets p5 canvas matching modern window view sizes perfectly
  const cnv = createCanvas(windowWidth, windowHeight);
  cnv.parent('p5-canvas-holder');
  colorMode(HSB, 360, 100, 100, 1);
  textFont('JetBrains Mono, Consolas, monospace');
  textSize(FONT_SIZE);
  textAlign(LEFT, TOP);
  clear(); 
  frameRate(30);
}

function draw() {
  const c = code[i % code.length];

  // Creates smoother, periodic trails that don't block the visual feedback loop below
  if (x === 0 && y % 12 === 0) {
    clear();
  }

  if (c === '\n') {
    y++;
    x = 0;
  } else if (c === '\t') {
    x = x - (x % 4) + 4;
  } else {
    // Modified opacity slightly to enhance background visibility 
    fill((j % 211) * (360 / 211), (j % 37) * (100 / 37), ((j % 107) * (100 / 107)) + 5, 0.7);
    text(c, (x * CHAR_W) + 20, ((y % 25) * LINE_H) + 20);
    x++;
  }

  if (x >= 45) {
    x = 0;
    y++;
  }

  i++;
  j++;
}

// Ensure resize transitions stay clean
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
