<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydra + p5 Visuals</title>
    <script src="https://unpkg.com/hydra-synth"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas { display: block; }
        #hydra-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        /* Keep p5 canvas hidden safely while Hydra samples its pixels */
        #p5-container {
            position: fixed;
            top: -9999px;
            left: -9999px;
        }
    </style>
</head>
<body>
    <canvas id="hydra-canvas"></canvas>
    <div id="p5-container"></div>

    <script>
        window.addEventListener('load', () => {
            const canvas = document.getElementById("hydra-canvas");
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;

            const hydra = new Hydra({
                canvas: canvas,
                detectAudio: false,
                makeGlobal: true,
                width: canvas.width,
                height: canvas.height
            });

            // --- Corrected p5 sketch setup in Instance Mode ---
            const sketch = (p) => {
                let cCode = [];
                let unicodeIcons = ['★', '⚙', '✦', '✦', '▲', '◆', '✖', '✚', '☯', '☣', '☢', '☭', '⚯', '♔', '♕'];
                let textX = 20;
                let textY = 30;
                let charSize = 16;

                p.preload = () => {
                    // Make sure 'code.txt' is sitting in your root directory!
                    cCode = p.loadStrings('code.txt');
                };

                p.setup = () => {
                    // Match the actual dimensions Hydra expects for clean canvas sourcing
                    let p5Canvas = p.createCanvas(window.innerWidth, window.innerHeight);
                    p5Canvas.parent('p5-container');
                    p.textFont('Courier New');
                    p.textSize(charSize);
                    
                    // CRITICAL: Set a high frame rate or remove p.noLoop() 
                    // Hydra requires active animation frames to update its texture
                    p.frameRate(30); 
                };

                p.draw = () => {
                    p.background(15);
                    
                    let fullText = cCode.join('\n');
                    let currentX = textX;
                    let currentY = textY;
                    
                    for (let i = 0; i < fullText.length; i++) {
                        let currentChar = fullText.charAt(i);
                        
                        if (currentChar === '\n') {
                            currentY += charSize * 1.5;
                            currentX = textX;
                            continue;
                        }
                        
                        let frequency = 0.05;
                        // Use p.sin instead of sin
                        let r = p.sin(frequency * i + 0) * 127 + 128;
                        let g = p.sin(frequency * i + 2) * 127 + 128;
                        let b = p.sin(frequency * i + 4) * 127 + 128;
                        p.fill(r, g, b);
                        
                        let displayChar = currentChar;
                        if (currentChar !== ' ' && currentChar !== '\t' && p.random(100) < 8) {
                            displayChar = p.random(unicodeIcons);
                        }
                        
                        p.text(displayChar, currentX, currentY);
                        currentX += p.textWidth(currentChar);
                        
                        if (currentX > p.width - textX) {
                            currentY += charSize * 1.5;
                            currentX = textX;
                        }
                    }
                };
            };

            // Instantiate and tie to variable that Hydra calls below
            const p5Instance = new p5(sketch);

            // Give Hydra a brief moment to map and scale the texture
            setTimeout(() => {
                s0.init({ src: p5Instance.canvas });

                function runVisuals() {
                    let dots = () => osc(20, 0.08, 5.5)
                      .rotate(0.05)
                      .modulateScale(osc(10, 0.05, 0.5).rotate(1.5), 0.7)
                      .color(0.8, 0.1, 0.5)
                      .add(osc(32, -0.05, 3.8).color(0.41, 0.99, 0.6));

                    speed = 1;

                    shape(100, 0.73, .32)
                      .diff(shape(100, 0.69, .07))
                      .mult(osc(3, 0.5, 62))
                      .scale(1, window.innerHeight / window.innerWidth)
                      .modulate(noise(.01))
                      .diff(noise(.4), .5)
                      .luma(.52, .2)
                      .add(dots(o0), .5)
                      .modulate(osc(.2, 0.91, 0.5))
                      .add(src(o0), 0.25)
                      .modulate(s0, 0.3)      // <-- p5 text glitched map driving Hydra distortion
                      .add(s0, 0.2)           // <-- p5 text layering color data cleanly
                      .luma(.5, .015)
                      .invert()
                      .out(o0);
                }

                runVisuals();
            }, 200);

            window.addEventListener('resize', () => {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                hydra.setResolution(canvas.width, canvas.height);
            });
        });
    </script>
</body>
</html>
